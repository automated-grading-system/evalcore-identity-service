name: Identity Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: identity-backend-cd-main
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: dorrissdang/evalcore-identity-service
  GHCR_IMAGE: ghcr.io/automated-grading-system/evalcore-identity-service

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:v${{ github.run_number }}
            ${{ env.DOCKERHUB_IMAGE }}:main
            ${{ env.DOCKERHUB_IMAGE }}:sha-${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:v${{ github.run_number }}
            ${{ env.GHCR_IMAGE }}:main
            ${{ env.GHCR_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
